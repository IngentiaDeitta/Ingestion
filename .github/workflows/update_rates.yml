name: Update Exchange Rates

on:
  schedule:
    - cron: '0 11 * * *' # 08:00 ART
    - cron: '0 16 * * *' # 13:00 ART (Refuerzo por si el BNA demora en actualizar)
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  update-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Asegura historial completo para el push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        run: python scripts/update_bna_rates.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'Antigravity Agent'
          git config --global user.email 'agent@antigravity.ai'
          git add src/data/exchange_rates.json
          # Solo commitear si hay cambios reales en el JSON
          if git diff --staged --quiet; then
            echo "No hay cambios en los tipos de cambio hoy."
          else
            git commit -m "chore: auto-update exchange rates from BNA/DolarAPI [skip ci]"
            git push origin main
          fi
