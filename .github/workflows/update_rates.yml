name: Update Exchange Rates

on:
  schedule:
    - cron: '0 11 * * *' # 8:00 AM ART (UTC-3)
  workflow_dispatch: # Permite ejecución manual

jobs:
  update-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        run: python scripts/update_bna_rates.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'Antigravity Agent'
          git config --global user.email 'agent@antigravity.ai'
          git add src/data/exchange_rates.json
          git commit -m "chore: auto-update exchange rates from BNA [skip ci]" || echo "No changes to commit"
          git push
